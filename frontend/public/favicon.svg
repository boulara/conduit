<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b8ff44" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7ecf00" stop-opacity="0.2"/>
    </radialGradient>
    <radialGradient id="bodyGrad" cx="40%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#6ab4ff"/>
      <stop offset="100%" stop-color="#1a5fb4"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#0d1a2e"/>

  <!-- Wing left upper -->
  <ellipse cx="18" cy="22" rx="11" ry="5" fill="rgba(150,200,255,0.22)" stroke="rgba(150,200,255,0.35)" stroke-width="0.8" transform="rotate(-25 18 22)"/>
  <!-- Wing right upper -->
  <ellipse cx="46" cy="22" rx="11" ry="5" fill="rgba(150,200,255,0.22)" stroke="rgba(150,200,255,0.35)" stroke-width="0.8" transform="rotate(25 46 22)"/>
  <!-- Wing left lower -->
  <ellipse cx="17" cy="28" rx="8" ry="3.5" fill="rgba(150,200,255,0.15)" stroke="rgba(150,200,255,0.25)" stroke-width="0.6" transform="rotate(-15 17 28)"/>
  <!-- Wing right lower -->
  <ellipse cx="47" cy="28" rx="8" ry="3.5" fill="rgba(150,200,255,0.15)" stroke="rgba(150,200,255,0.25)" stroke-width="0.6" transform="rotate(15 47 28)"/>

  <!-- Body -->
  <ellipse cx="32" cy="24" rx="5.5" ry="9" fill="url(#bodyGrad)" stroke="#4f8ef7" stroke-width="0.8"/>

  <!-- Abdomen glow halo -->
  <circle cx="32" cy="38" r="9" fill="url(#glowGrad)" filter="url(#glow)" opacity="0.85"/>

  <!-- Abdomen -->
  <ellipse cx="32" cy="38" rx="5" ry="6.5" fill="#aaee22" stroke="#c8ff44" stroke-width="0.7"/>

  <!-- Abdomen shine -->
  <ellipse cx="30.5" cy="35.5" rx="1.5" ry="2" fill="rgba(255,255,255,0.4)"/>

  <!-- Antenna left -->
  <line x1="29" y1="15.5" x2="23" y2="8" stroke="#4f8ef7" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="22.5" cy="7.5" r="1.5" fill="#6ab4ff"/>
  <!-- Antenna right -->
  <line x1="35" y1="15.5" x2="41" y2="8" stroke="#4f8ef7" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="41.5" cy="7.5" r="1.5" fill="#6ab4ff"/>

  <!-- Eye highlights -->
  <circle cx="29.5" cy="21" r="1.2" fill="rgba(255,255,255,0.7)"/>
  <circle cx="34.5" cy="21" r="1.2" fill="rgba(255,255,255,0.7)"/>
</svg>
